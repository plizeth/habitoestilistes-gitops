apiVersion: apps/v1
kind: Deployment
metadata:
  name: habito-web
  namespace: habito-web
  labels:
    app: habito-web
    app.kubernetes.io/name: habito-web
    app.kubernetes.io/component: frontend
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: habito-web
  template:
    metadata:
      labels:
        app: habito-web
        version: latest
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: habito-web
          image: quay.io/plizeth/habito-web:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: NODE_ENV
              value: "production"
            - name: MERGE_DELAY_MS
              value: "3500"
            - name: N8N_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: habito-secrets
                  key: n8n-webhook-url
                  optional: true
          # ── Monta el ConfigMap como archivo en public/config.json
          volumeMounts:
            - name: habito-config
              mountPath: /opt/app-root/src/public/config.json
              subPath: config.json
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
      volumes:
        - name: habito-config
          configMap:
            name: habito-config
