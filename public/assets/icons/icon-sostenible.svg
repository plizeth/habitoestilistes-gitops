<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <style>
    .stem  { stroke-dasharray:30; stroke-dashoffset:30; animation: grow .8s ease-out .1s forwards; }
    .stem2 { stroke-dasharray:14; stroke-dashoffset:14; animation: grow .5s ease-out .7s forwards; }
    .leaf-l { opacity:0; transform-origin:36px 46px; animation: leafappear .5s ease-out .8s forwards; }
    .leaf-r { opacity:0; transform-origin:44px 36px; animation: leafappear .5s ease-out 1.1s forwards; }
    .soil   { transform-origin:40px 62px; animation: soilpop .4s cubic-bezier(.34,1.56,.64,1) forwards; }
    .drop   { animation: drip 3.5s ease-in-out 1.6s infinite; }
    .glow   { animation: bgpulse 3s ease-in-out infinite; }
    @keyframes grow       { to { stroke-dashoffset:0; } }
    @keyframes leafappear { to { opacity:1; } }
    @keyframes soilpop    { from { transform:scaleX(0); } to { transform:scaleX(1); } }
    @keyframes drip {
      0%   { opacity:0; transform:translateY(-2px); }
      20%  { opacity:1; }
      80%  { opacity:1; }
      100% { opacity:0; transform:translateY(7px); }
    }
    @keyframes bgpulse { 0%,100% { opacity:.1; } 50% { opacity:.2; } }
  </style>

  <!-- Halo -->
  <circle class="glow" cx="40" cy="40" r="34" fill="#8cc9d3"/>

  <!-- Tierra -->
  <ellipse class="soil" cx="40" cy="62" rx="18" ry="5" fill="#c9cfc3"/>

  <!-- Tallo principal -->
  <path class="stem" d="M40 60 C40 50 40 44 40 30" stroke="#5faeb9" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Tallo secundario izquierda -->
  <path class="stem2" d="M40 46 C36 42 30 40 26 38" stroke="#5faeb9" stroke-width="2" stroke-linecap="round"/>

  <!-- HOJA GRANDE izquierda (la más visible) -->
  <g class="leaf-l">
    <!-- Hoja grande con forma clara -->
    <path d="M26 38 C20 28 22 14 34 12 C42 10 46 18 44 26 C42 34 34 40 26 38 Z"
          fill="#8cc9d3"/>
    <!-- Nervio central prominente -->
    <path d="M26 38 C30 30 34 20 34 12" stroke="white" stroke-width="1.4" stroke-linecap="round" opacity=".5"/>
    <!-- Nervios laterales -->
    <path d="M28 32 C24 30 22 26 22 24" stroke="white" stroke-width=".9" stroke-linecap="round" opacity=".4"/>
    <path d="M30 26 C27 23 25 20 25 18" stroke="white" stroke-width=".9" stroke-linecap="round" opacity=".4"/>
    <path d="M32 20 C30 17 30 15 31 13" stroke="white" stroke-width=".9" stroke-linecap="round" opacity=".35"/>
  </g>

  <!-- Hoja pequeña derecha -->
  <g class="leaf-r">
    <path d="M40 30 C46 24 56 22 56 30 C56 38 48 40 42 36 C40 34 40 30 40 30Z"
          fill="#5faeb9" opacity=".85"/>
    <path d="M40 30 C46 28 54 28 56 30" stroke="white" stroke-width="1" stroke-linecap="round" opacity=".4"/>
  </g>

  <!-- Gota de agua -->
  <g class="drop" transform="translate(55,20)">
    <path d="M0 0 C-3.5 5 -3.5 10 0 10 C3.5 10 3.5 5 0 0Z" fill="#c5e5ea"/>
  </g>
</svg>
